services:
  # ---------------------------------------------------------------------------
  # Observabilidade (LGTM Stack + OTel Collector)
  # ---------------------------------------------------------------------------
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: saga-lgtm
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/provisioning/datasources:/otel-lgtm/datasources
      - ./infra/grafana/provisioning/dashboards:/otel-lgtm/dashboards-config
      - ./infra/grafana/dashboards:/otel-lgtm/dashboards
    networks:
      - saga-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  otelcol:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: saga-otelcol
    command: ["--config=/etc/otelcol/otelcol.yaml"]
    volumes:
      - ./infra/otel/otelcol.yaml:/etc/otelcol/otelcol.yaml:ro
      - ./infra/otel/processors/sampling:/etc/otelcol/processors/sampling:ro
    environment:
      - TRACES_URL=http://lgtm:4318/v1/traces
      - LOGS_URL=http://lgtm:4318/v1/logs
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      lgtm:
        condition: service_healthy
    networks:
      - saga-network

  # ---------------------------------------------------------------------------
  # Infraestrutura
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:latest
    container_name: saga-localstack
    ports:
      - "${LOCALSTACK_PORT}:4566"
    environment:
      - SERVICES=sqs
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1
    volumes:
      - ./infra/localstack/init-sqs.sh:/etc/localstack/init/ready.d/init-sqs.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - saga-network

  postgres:
    image: postgres:16-alpine
    container_name: saga-postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - saga-network

  # ---------------------------------------------------------------------------
  # Servicos .NET
  # ---------------------------------------------------------------------------
  order-service:
    build:
      context: .
      dockerfile: src/OrderService/Dockerfile
    container_name: saga-order-service
    ports:
      - "${ORDER_SERVICE_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:8080
      - AWS_SERVICE_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - ConnectionStrings__SagaDb=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otelcol:4317
      - OTEL_SERVICE_NAME=order-service
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otelcol:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - saga-network

  payment-service:
    build:
      context: .
      dockerfile: src/PaymentService/Dockerfile
    container_name: saga-payment-service
    ports:
      - "${PAYMENT_SERVICE_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:8080
      - AWS_SERVICE_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - ConnectionStrings__SagaDb=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otelcol:4317
      - OTEL_SERVICE_NAME=payment-service
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otelcol:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - saga-network

  inventory-service:
    build:
      context: .
      dockerfile: src/InventoryService/Dockerfile
    container_name: saga-inventory-service
    ports:
      - "${INVENTORY_SERVICE_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:8080
      - AWS_SERVICE_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - ConnectionStrings__SagaDb=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      # INVENTORY_LOCKING_MODE=pessimistic → SELECT FOR UPDATE (padrao, sem overbooking)
      # INVENTORY_LOCKING_MODE=optimistic  → version check + retry automatico
      # INVENTORY_LOCKING_MODE=none        → sem lock + delay 150ms (demonstra race condition)
      # Compatibilidade: INVENTORY_LOCKING_ENABLED=true/false ainda funciona como fallback
      - INVENTORY_LOCKING_MODE=${INVENTORY_LOCKING_MODE:-pessimistic}
      # - INVENTORY_OPTIMISTIC_MAX_RETRIES=3  # default: 3 (so necessario no modo optimistic)
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otelcol:4317
      - OTEL_SERVICE_NAME=inventory-service
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otelcol:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - saga-network

  shipping-service:
    build:
      context: .
      dockerfile: src/ShippingService/Dockerfile
    container_name: saga-shipping-service
    ports:
      - "${SHIPPING_SERVICE_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:8080
      - AWS_SERVICE_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - ConnectionStrings__SagaDb=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otelcol:4317
      - OTEL_SERVICE_NAME=shipping-service
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otelcol:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - saga-network

# ---------------------------------------------------------------------------
# Rede
# ---------------------------------------------------------------------------
networks:
  saga-network:
    driver: bridge
