services:
  # ---------------------------------------------------------------------------
  # Infraestrutura
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:latest
    container_name: saga-localstack
    ports:
      - "${LOCALSTACK_PORT}:4566"
    environment:
      - SERVICES=sqs
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1
    volumes:
      - ./infra/localstack/init-sqs.sh:/etc/localstack/init/ready.d/init-sqs.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - saga-network

  postgres:
    image: postgres:16-alpine
    container_name: saga-postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - saga-network

  # ---------------------------------------------------------------------------
  # Servicos .NET
  # ---------------------------------------------------------------------------
  order-service:
    build:
      context: .
      dockerfile: src/OrderService/Dockerfile
    container_name: saga-order-service
    ports:
      - "${ORDER_SERVICE_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:8080
      - AWS_SERVICE_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - ConnectionStrings__SagaDb=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - SAGA_ORCHESTRATOR_URL=http://saga-orchestrator:8080
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - saga-network

  saga-orchestrator:
    build:
      context: .
      dockerfile: src/SagaOrchestrator/Dockerfile
    container_name: saga-orchestrator
    ports:
      - "${SAGA_ORCHESTRATOR_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:8080
      - AWS_SERVICE_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - ConnectionStrings__SagaDb=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - saga-network

  payment-service:
    build:
      context: .
      dockerfile: src/PaymentService/Dockerfile
    container_name: saga-payment-service
    ports:
      - "${PAYMENT_SERVICE_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:8080
      - AWS_SERVICE_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - ConnectionStrings__SagaDb=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - saga-network

  inventory-service:
    build:
      context: .
      dockerfile: src/InventoryService/Dockerfile
    container_name: saga-inventory-service
    ports:
      - "${INVENTORY_SERVICE_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:8080
      - AWS_SERVICE_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - ConnectionStrings__SagaDb=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      # INVENTORY_LOCKING_MODE=pessimistic → SELECT FOR UPDATE (padrao, sem overbooking)
      # INVENTORY_LOCKING_MODE=optimistic  → version check + retry automatico
      # INVENTORY_LOCKING_MODE=none        → sem lock + delay 150ms (demonstra race condition)
      # Compatibilidade: INVENTORY_LOCKING_ENABLED=true/false ainda funciona como fallback
      - INVENTORY_LOCKING_MODE=${INVENTORY_LOCKING_MODE:-pessimistic}
      # - INVENTORY_OPTIMISTIC_MAX_RETRIES=3  # default: 3 (so necessario no modo optimistic)
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - saga-network

  shipping-service:
    build:
      context: .
      dockerfile: src/ShippingService/Dockerfile
    container_name: saga-shipping-service
    ports:
      - "${SHIPPING_SERVICE_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:8080
      - AWS_SERVICE_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - ConnectionStrings__SagaDb=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - saga-network

# ---------------------------------------------------------------------------
# Rede
# ---------------------------------------------------------------------------
networks:
  saga-network:
    driver: bridge
