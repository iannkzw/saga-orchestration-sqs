# Override para testes de integração
# Uso: docker compose -f docker-compose.yml -f tests/IntegrationTests/docker-compose.test.yml up -d
#
# Garante portas fixas (5001-5005) e modo de lock determinístico para os testes.
# restart: on-failure garante que os serviços reiniciem caso as filas SQS ainda não
# existam no momento do startup (o init-sqs.sh do LocalStack roda de forma assíncrona).

services:
  order-service:
    ports:
      - "5001:8080"
    restart: unless-stopped

  saga-orchestrator:
    ports:
      - "5002:8080"
    restart: unless-stopped

  payment-service:
    ports:
      - "5003:8080"
    restart: unless-stopped

  inventory-service:
    ports:
      - "5004:8080"
    environment:
      - INVENTORY_LOCKING_MODE=pessimistic
    restart: unless-stopped

  shipping-service:
    ports:
      - "5005:8080"
    restart: unless-stopped
